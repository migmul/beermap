<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeerMap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/glassmorphism.css">
</head>
<body>
    <!-- En-tête pleine largeur -->
    <header class="glass-panel top-header">
        <div class="logo">🍺 BeerMap</div>
        <nav class="main-nav">
            <a href="#" class="active">Vue carte</a>
            <a href="#">Vue liste</a>
            <button id="theme-toggle" class="glass-btn">🌞/🌙</button>
        </nav>
    </header>

    <!-- Barre latérale gauche -->
    <aside class="glass-panel sidebar">
        <h3>Recherche & Filtres</h3>
        <input type="text" id="search-input" class="glass-input" placeholder="Nom ou adresse du bar...">
        
        <div class="filters-vertical">
            <label class="toggle">
                <input type="checkbox" id="filter-hh"> 🔥 En Happy Hour
            </label>
            <label class="toggle">
                <input type="checkbox" id="filter-price"> 🍺 Pinte < 5€
            </label>
        </div>
    </aside>

    <main id="map-container"></main>

    <!-- Modale Détails du Bar -->
    <div id="bar-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Nom du Bar</h2>
            <div id="hh-indicator" class="indicator hidden">🔥 Happy Hour en cours !</div>
            <img id="modal-image" src="" alt="Photo du bar" style="display:none; width:100%; border-radius: 8px; margin-bottom: 15px;">
            <p><strong>Adresse:</strong> <span id="modal-address"></span></p>
            <p><strong>Téléphone:</strong> <span id="modal-phone"></span></p>
            <p><strong>Horaires:</strong> <span id="modal-hours"></span> (HH: <span id="modal-hh"></span>)</p>
            <div class="tags" id="modal-tags" style="margin: 10px 0;"></div>
            <h3>Menu</h3>
            <ul id="modal-menu" style="margin-bottom: 15px;"></ul>
            
            <div class="modal-actions">
                <button id="btn-edit-bar" class="glass-btn">✏️ Modifier</button>
                <button id="btn-delete-bar" class="glass-btn danger">🗑️ Supprimer</button>
            </div>
        </div>
    </div>

    <!-- Bouton d'ajout -->
    <button id="fab-add" class="glass-btn fab">+</button>
    
    <div id="add-modal" class="modal hidden">
        <div class="modal-content glass-panel animated-modal">
            <!-- Modale d'Ajout/Modification -->
            <span class="close-btn-add">&times;</span>
            <h2 id="form-title" style="margin-bottom: 25px;">Suggérer un nouveau bar</h2>
            <form id="add-bar-form">
                <input type="hidden" id="add-bar-id">
                <input type="text" id="add-name" placeholder="Nom du bar" required class="glass-input">
                <input type="text" id="add-address" placeholder="Adresse complète" required class="glass-input">
                <input type="text" id="add-phone" placeholder="Téléphone" class="glass-input">
                
                <!-- Nouveaux champs Time -->
                <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
                    <label style="width: 100px; font-size: 0.9em;">Horaires :</label>
                    <input type="time" id="add-hours-start" class="glass-input" style="margin-bottom: 0;">
                    <span>à</span>
                    <input type="time" id="add-hours-end" class="glass-input" style="margin-bottom: 0;">
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
                    <label style="width: 100px; font-size: 0.9em;">Happy Hour :</label>
                    <input type="time" id="add-hh-start" class="glass-input" style="margin-bottom: 0;">
                    <span>à</span>
                    <input type="time" id="add-hh-end" class="glass-input" style="margin-bottom: 0;">
                </div>
                
                <!-- Menu Simplifié : Prix de la pinte -->
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="number" step="0.10" id="add-price-normal" placeholder="Prix Pinte (€)" class="glass-input">
                    <input type="number" step="0.10" id="add-price-hh" placeholder="Prix Pinte HH (€)" class="glass-input">
                </div>

                <input type="text" id="add-tags" placeholder="Tags séparés par des virgules (ex: Terrasse, PMR)" class="glass-input">

                <label for="add-image" style="font-size: 0.9em; margin-bottom: 5px; display: block;">Photo du bar :</label>
                <input type="file" id="add-image" accept="image/*" class="glass-input">
                
                <button type="submit" id="submit-btn" class="glass-btn primary" style="width: 100%;">Enregistrer</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
